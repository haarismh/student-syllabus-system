<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Syllabus Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <h2>Syllabus<span>Hub</span></h2>
            </div>
            
            <nav class="filter-nav">
                <h3>Filters</h3>
                <div class="filter-group">
                    <label for="year-select">Select Year</label>
                    <select id="year-select">
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="semester-select">Select Semester</label>
                    <select id="semester-select">
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                    </select>
                </div>

                <button id="apply-filters" class="primary-btn">Apply Filters</button>
            </nav>

            <div class="upload-trigger-container">
                <button id="admin-login-btn" class="secondary-btn" style="margin-bottom: 10px; border: 1px solid #ddd; background: transparent;">Admin Login</button>
                <button id="open-upload-modal" class="secondary-btn hidden">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="icon"><path d="M12 4v16m-8-8h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    Upload Syllabus
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1>Academic Syllabus Repository</h1>
                <p>Browse and download course syllabuses by year and semester.</p>
            </header>

            <div class="content-area">
                <div id="loader" class="loader hidden"></div>
                <div id="error-message" class="error hidden"></div>
                <div id="syllabus-grid" class="grid">
                    <!-- Syllabus cards will be injected here via JS -->
                </div>
                <div id="empty-state" class="empty-state hidden">
                    <img src="https://cdni.iconscout.com/illustration/premium/thumb/folder-is-empty-4064360-3363384.png" alt="No data" width="200" />
                    <p>No syllabuses found for the selected filters.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Upload New Syllabus</h2>
            <form id="upload-form">
                <div class="form-group">
                    <label for="upload-year">Year</label>
                    <select id="upload-year" name="year" required>
                        <option value="" disabled selected>Select Year</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="upload-semester">Semester</label>
                    <select id="upload-semester" name="semester" required>
                        <option value="" disabled selected>Select Semester</option>
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="subject-name">Subject Name</label>
                    <input type="text" id="subject-name" name="subject_name" placeholder="e.g. Data Structures" required>
                </div>
                <div class="form-group">
                    <label for="pdf-file">Syllabus PDF File</label>
                    <input type="file" id="pdf-file" name="pdf_file" accept="application/pdf" required>
                </div>
                <button type="submit" class="primary-btn submit-btn">
                    <span>Upload File</span>
                    <div class="spinner hidden"></div>
                </button>
                <div id="upload-feedback" class="feedback hidden"></div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
